name: Deploy Backend → Hetzner

on:
  push:
    branches: [master]
    paths: ["backend/api/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PHP API to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "backend/api/*"
          target: "/var/www/def-lab/api"
          strip_components: 2
          rm: false
