name: Deploy Frontend → Hetzner

on:
  push:
    branches: [master]
    paths: ["frontend/**"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Sicherstellen dass Verzeichnis existiert und Apache läuft
      - name: Prepare server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            mkdir -p /var/www/def-lab/api
            chown -R www-data:www-data /var/www/def-lab
            systemctl is-active apache2 || systemctl start apache2

      - name: Upload frontend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/def-lab"
          strip_components: 2

      - name: Fix permissions & reload Apache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            chown -R www-data:www-data /var/www/def-lab
            systemctl reload apache2
            echo "✅ Frontend deployed to /var/www/def-lab"
